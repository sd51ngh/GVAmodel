<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GVA Scenario Modeler v3.0</title>
  <link rel="stylesheet" href="GVA_modeler.css">
</head>

<body>
  <!-- Login Screen -->
  <div id="loginOverlay" class="login-overlay">
    <div class="login-card">
      <h2>GVA Scenario Modeler</h2>
      <p>Please enter your credentials to access the scenario modeler.</p>
      
      <div id="loginError" class="login-error">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        <span id="loginErrorMsg">Invalid username or password.</span>
      </div>

      <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="login-field">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" required autocomplete="username" placeholder="Enter username">
        </div>
        <div class="login-field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required autocomplete="current-password" placeholder="Enter password">
        </div>
        <button type="submit" class="btn-login">Sign In</button>
      </form>
    </div>
  </div>

  <div id="app-root"></div>

  <script src="GVA_modeler.js"></script>
</body>

</html>
